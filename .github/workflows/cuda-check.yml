name: CUDA Compilation Check

on:
  push:
    branches: [main, develop, 'release/**', 'alpha/**']
  pull_request:
    branches: [main, develop]

jobs:
  cuda-compile:
    name: CUDA Header Compilation
    runs-on: ubuntu-latest
    container: nvidia/cuda:12.6.0-devel-ubuntu24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y \
            cmake \
            ninja-build \
            openmpi-bin \
            libopenmpi-dev

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DDTL_ENABLE_CUDA=ON \
            -DDTL_ENABLE_MPI=ON \
            -DDTL_BUILD_TESTS=OFF

      - name: Build (compile-only verification)
        run: cmake --build build -j$(nproc)
